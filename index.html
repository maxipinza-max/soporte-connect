async function loadData() {
  const data = EMBEDDED_DATA;
  allStories = data.stories || [];

  const dt = new Date(data.last_updated);
  document.getElementById('last-updated').textContent =
    dt.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

  populateEpicFilter();
  applyFilters();
  showToast(`${allStories.length} historias cargadas`);
}

// ── Populate epic filter ────────────────────────────────────────────────
function populateEpicFilter() {
  const epics = [...new Map(
    allStories
      .filter(s => s.epic_key)
      .map(s => [s.epic_key, s.epic_name || s.epic_key])
  ).entries()].sort((a, b) => (a[1] || '').localeCompare(b[1] || '', 'es'));

  const el = document.getElementById('filter-epic');
  epics.forEach(([key, name]) => {
    el.add(new Option(name, key));
  });
}

// ── Apply filters ───────────────────────────────────────────────────────
function applyFilters() {
  const epicFilter   = document.getElementById('filter-epic').value;
  const laneFilter   = document.getElementById('filter-lane').value;
  const searchFilter = document.getElementById('search-input').value.toLowerCase().trim();

  const tipoFilter = document.getElementById('filter-tipo').value;

  filtered = allStories.filter(s => {
    if (epicFilter && s.epic_key !== epicFilter) return false;
    if (laneFilter && s.lane !== laneFilter) return false;
    if (tipoFilter && s.issuetype !== tipoFilter) return false;
    if (searchFilter &&
        !s.summary.toLowerCase().includes(searchFilter) &&
        !s.key.toLowerCase().includes(searchFilter)) return false;
    return true;
  });

  renderStats();
  renderBoard();

  const count = document.getElementById('results-count');
  count.textContent = `${filtered.length} historia${filtered.length !== 1 ? 's' : ''} encontrada${filtered.length !== 1 ? 's' : ''}`;
}

// ── Render summary stats ────────────────────────────────────────────────
function renderStats() {
  const counts = {};
  LANE_ORDER.forEach(l => counts[l] = 0);
  allStories.forEach(s => { if (counts[s.lane] !== undefined) counts[s.lane]++; });

  const activeAssignees = new Set(
    allStories
      .filter(s => s.assignee && s.lane !== "HECHO")
      .map(s => s.assignee)
  ).size;

  const defs = [
    { lane: "POR HACER",  bg: "bg-slate-50 border border-slate-200",    text: "text-slate-700"  },
    { lane: "EN CURSO",   bg: "bg-blue-50 border border-blue-200",      text: "text-blue-700"   },
    { lane: "VALIDACION", bg: "bg-purple-50 border border-purple-200",  text: "text-purple-700" },
    { lane: "BLOQUEADO",  bg: "bg-red-50 border border-red-200",        text: "text-red-700"    },
    { lane: "HECHO",      bg: "bg-green-50 border border-green-200",    text: "text-green-700"  },
  ];

  const activeNames = [...new Set(
    allStories
      .filter(s => s.assignee && s.lane !== "HECHO")
      .map(s => s.assignee)
  )].sort((a, b) => a.localeCompare(b, 'es'));

  const namesList = activeNames.length
    ? activeNames.map(n => `
        <div class="flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 shrink-0"></span>
          <span class="text-[11px] text-indigo-700 truncate">${escHtml(n)}</span>
        </div>`).join('')
    : `<p class="text-[11px] text-indigo-400 italic">Sin asignados</p>`;

  const peopleStat = `
    <div class="bg-indigo-50 border border-indigo-200 rounded-2xl p-4 shadow-sm col-span-2 sm:col-span-1">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <p class="text-xs font-semibold text-indigo-700 opacity-70 uppercase tracking-wide">Personas Activas</p>
        <span class="ml-auto text-2xl font-bold text-indigo-700">${activeAssignees}</span>
      </div>
      <div class="space-y-1 max-h-24 overflow-y-auto pr-1">
        ${namesList}
      </div>
    </div>`;

  document.getElementById('stats-row').innerHTML =
    defs.map(d => `
    <div class="${d.bg} rounded-2xl p-4 shadow-sm">
      <p class="text-3xl font-bold ${d.text}">${counts[d.lane]}</p>
      <div class="flex items-center gap-1.5 mt-1">
        <span class="${d.text} opacity-60">${LANE_META[d.lane].icon}</span>
        <p class="text-xs font-semibold ${d.text} opacity-70">${d.lane}</p>
      </div>
    </div>`).join('') + peopleStat;
}

// ── Render Kanban board ─────────────────────────────────────────────────
function renderBoard() {
  const byLane = {};
  LANE_ORDER.forEach(l => byLane[l] = []);
  filtered.forEach(s => {
    if (byLane[s.lane] !== undefined) byLane[s.lane].push(s);
  });

  const board = document.getElementById('kanban-board');
  board.innerHTML = LANE_ORDER.map(lane => {
    const meta  = LANE_META[lane];
    const cards = byLane[lane];
    const count = cards.length;

    const cardHTML = cards.length === 0
      ? `<div class="text-center py-8 text-slate-400 text-sm">Sin historias</div>`
      : cards.map(s => renderCard(s, meta)).join('');

    return `
    <div class="lane-col flex-1 ${meta.laneClass} rounded-2xl shadow-sm border border-slate-200">
      <!-- Lane header (outside scroll area) -->
      <div class="${meta.headerClass} px-4 py-3 flex items-center justify-between border-b border-slate-200/60 rounded-t-2xl shrink-0">
        <div class="flex items-center gap-2">
          ${meta.icon}
          <span class="text-sm font-bold tracking-wide">${lane}</span>
        </div>
        <span class="text-xs font-bold bg-white/60 px-2 py-0.5 rounded-full">${count}</span>
      </div>
      <!-- Cards (scrollable) -->
      <div class="lane-cards p-3 space-y-2.5">
        ${cardHTML}
      </div>
    </div>`;
  }).join('');
}

// ── Render a single card ────────────────────────────────────────────────
function renderCard(s, meta) {
  const ISSUETYPE_STYLE = {
    'Historia': 'bg-indigo-50 text-indigo-600 border-indigo-200',
    'Tarea':    'bg-amber-50 text-amber-700 border-amber-200',
    'Error':    'bg-rose-50 text-rose-700 border-rose-200',
  };
  const typeBadge = s.issuetype
    ? `<span class="chip ${ISSUETYPE_STYLE[s.issuetype] || 'bg-slate-100 text-slate-500 border-slate-200'} shrink-0 text-[10px]">${escHtml(s.issuetype)}</span>`
    : '';

  const epicBadge = s.epic_name
    ? `<div class="flex items-center gap-1 mt-2">
         <svg class="w-3 h-3 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M13 10V3L4 14h7v7l9-11h-7z"/>
         </svg>
         <span class="text-xs text-indigo-600 font-medium line-clamp-1">${escHtml(s.epic_name)}</span>
       </div>`
    : '';

  const statusBadge = s.status && s.status.toUpperCase() !== s.lane
    ? `<span class="chip ${meta.statusClass} shrink-0 text-[10px]">${escHtml(s.status)}</span>`
    : '';

  const assigneeBadge = s.assignee
    ? `<div class="flex items-center gap-1 mt-2">
         <svg class="w-3 h-3 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
         </svg>
         <span class="text-[11px] text-slate-500 line-clamp-1">${escHtml(s.assignee)}</span>
       </div>`
    : '';

  return `
  <a href="${s.url}" target="_blank"
     class="block bg-white rounded-xl border border-slate-200 p-3 card-hover shadow-sm group">
    <div class="flex items-start justify-between gap-2 mb-1.5">
      <div class="flex items-center gap-1.5 min-w-0">
        <span class="text-[10px] font-mono text-slate-400 group-hover:text-indigo-500 transition-colors shrink-0">${s.key}</span>
        ${typeBadge}
      </div>
      ${statusBadge}
    </div>
    <h3 class="text-xs font-semibold text-slate-800 leading-snug line-clamp-3 group-hover:text-indigo-700 transition-colors">
      ${escHtml(s.summary)}
    </h3>
    ${epicBadge}
    ${assigneeBadge}
  </a>`;
}

// ── Helpers ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return (str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function clearFilters() {
  document.getElementById('filter-epic').value = '';
  document.getElementById('filter-lane').value = '';
  document.getElementById('filter-tipo').value = '';
  document.getElementById('search-input').value = '';
  applyFilters();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  t.style.pointerEvents = 'auto';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateY(8px)';
    t.style.pointerEvents = 'none';
  }, 2500);
}

// ── Init ────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
