async function loadData() {
  const data = EMBEDDED_DATA;
  allStories = data.stories || [];

  const dt = new Date(data.last_updated);
  document.getElementById('last-updated').textContent =
    dt.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

  populateEpicFilter();
  applyFilters();
  showToast(`${allStories.length} historias cargadas`);
}

// ── Populate epic filter ────────────────────────────────────────────────
function populateEpicFilter() {
  const epics = [...new Map(
    allStories
      .filter(s => s.epic_key)
      .map(s => [s.epic_key, s.epic_name || s.epic_key])
  ).entries()].sort((a, b) => (a[1] || '').localeCompare(b[1] || '', 'es'));

  const el = document.getElementById('filter-epic');
  epics.forEach(([key, name]) => {
    el.add(new Option(name, key));
  });
}

// ── Apply filters ───────────────────────────────────────────────────────
function applyFilters() {
  const epicFilter   = document.getElementById('filter-epic').value;
  const laneFilter   = document.getElementById('filter-lane').value;
  const searchFilter = document.getElementById('search-input').value.toLowerCase().trim();

  const tipoFilter = document.getElementById('filter-tipo').value;

  filtered = allStories.filter(s => {
    if (epicFilter && s.epic_key !== epicFilter) return false;
    if (laneFilter && s.lane !== laneFilter) return false;
    if (tipoFilter && s.issuetype !== tipoFilter) return false;
    if (searchFilter &&
        !s.summary.toLowerCase().includes(searchFilter) &&
        !s.key.toLowerCase().includes(searchFilter)) return false;
    return true;
  });

  renderStats();
  renderBoard();

  const count = document.getElementById('results-count');
  count.textContent = `${filtered.length} historia${filtered.length !== 1 ? 's' : ''} encontrada${filtered.length !== 1 ? 's' : ''}`;
}

// ── Render Kanban board ─────────────────────────────────────────────────
function renderBoard() {
  const byLane = {};
  LANE_ORDER.forEach(l => byLane[l] = []);
  filtered.forEach(s => {
    if (byLane[s.lane] !== undefined) byLane[s.lane].push(s);
  });

  const board = document.getElementById('kanban-board');
  board.innerHTML = LANE_ORDER.map(lane => {
    const meta  = LANE_META[lane];
    const cards = byLane[lane];
    const count = cards.length;

    const cardHTML = cards.length === 0
      ? `<div class="text-center py-8 text-slate-400 text-sm">Sin historias</div>`
      : cards.map(s => renderCard(s, meta)).join('');

    return `
    <div class="lane-col flex-1 ${meta.laneClass} rounded-2xl shadow-sm border border-slate-200">
      <!-- Lane header (outside scroll area) -->
      <div class="${meta.headerClass} px-4 py-3 flex items-center justify-between border-b border-slate-200/60 rounded-t-2xl shrink-0">
        <div class="flex items-center gap-2">
          ${meta.icon}
          <span class="text-sm font-bold tracking-wide">${lane}</span>
        </div>
        <span class="text-xs font-bold bg-white/60 px-2 py-0.5 rounded-full">${count}</span>
      </div>
      <!-- Cards (scrollable) -->
      <div class="lane-cards p-3 space-y-2.5">
        ${cardHTML}
      </div>
    </div>`;
  }).join('');
}

const PRIORITY_STYLE = {
  'Highest': { chip: 'bg-rose-50 text-rose-700 border-rose-300',    dot: 'bg-rose-500',    icon: '⬆⬆' },
  'High':    { chip: 'bg-orange-50 text-orange-700 border-orange-300', dot: 'bg-orange-400', icon: '⬆' },
  'Medium':  { chip: 'bg-yellow-50 text-yellow-700 border-yellow-300', dot: 'bg-yellow-400', icon: '➡' },
  'Low':     { chip: 'bg-slate-100 text-slate-500 border-slate-300', dot: 'bg-slate-400',   icon: '⬇' },
};

const ISSUETYPE_STYLE = {
  'Historia': 'bg-indigo-50 text-indigo-600 border-indigo-200',
  'Tarea':    'bg-amber-50 text-amber-700 border-amber-200',
  'Error':    'bg-rose-50 text-rose-700 border-rose-200',
};

// ── Render a single card ────────────────────────────────────────────────
function renderCard(s, meta) {
  const typeBadge = s.issuetype
    ? `<span class="chip ${ISSUETYPE_STYLE[s.issuetype] || 'bg-slate-100 text-slate-500 border-slate-200'} shrink-0 text-[10px]">${escHtml(s.issuetype)}</span>`
    : '';

  const prioConf = PRIORITY_STYLE[s.priority];
  const prioBadge = prioConf
    ? `<span class="flex items-center gap-0.5">
         <span class="w-1.5 h-1.5 rounded-full ${prioConf.dot} shrink-0"></span>
         <span class="text-[10px] font-medium text-slate-500">${escHtml(s.priority)}</span>
       </span>`
    : '';

  const spBadge = s.story_points != null
    ? `<span class="chip bg-slate-100 text-slate-600 border-slate-200 shrink-0 text-[10px]">SP: ${s.story_points}</span>`
    : '';

  const epicBadge = s.epic_name
    ? `<div class="flex items-center gap-1 mt-2">
         <svg class="w-3 h-3 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
         </svg>
         <span class="text-xs text-indigo-600 font-medium line-clamp-1">${escHtml(s.epic_name)}</span>
       </div>`
    : '';

  const assigneeBadge = s.assignee
    ? `<div class="flex items-center gap-1 mt-2">
         <svg class="w-3 h-3 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
         </svg>
         <span class="text-[11px] text-slate-500 line-clamp-1">${escHtml(s.assignee)}</span>
       </div>`
    : '';

  const dataKey = escHtml(s.key).replace(/"/g, '&quot;');

  return `
  <div onclick="openModal('${s.key}')"
     class="block bg-white rounded-xl border border-slate-200 p-3 card-hover shadow-sm group cursor-pointer">
    <div class="flex items-start justify-between gap-2 mb-1.5">
      <div class="flex items-center gap-1.5 min-w-0 flex-wrap">
        <span class="text-[10px] font-mono text-slate-400 group-hover:text-indigo-500 transition-colors shrink-0">${s.key}</span>
        ${typeBadge}
        ${prioBadge}
      </div>
      ${spBadge}
    </div>
    <h3 class="text-xs font-semibold text-slate-800 leading-snug line-clamp-3 group-hover:text-indigo-700 transition-colors">
      ${escHtml(s.summary)}
    </h3>
    ${epicBadge}
    ${assigneeBadge}
  </div>`;
}

// ── Modal ────────────────────────────────────────────────────────────────
function openModal(key) {
  const s = allStories.find(x => x.key === key);
  if (!s) return;

  document.getElementById('modal-key').textContent   = s.key;
  document.getElementById('modal-title').textContent = s.summary;

  // Type badge
  const typeBadge = document.getElementById('modal-type-badge');
  const typeClass = ISSUETYPE_STYLE[s.issuetype] || 'bg-slate-100 text-slate-500 border-slate-200';
  typeBadge.className = 'chip text-[10px] ' + typeClass;
  typeBadge.textContent = s.issuetype || '';

  // Priority badge
  const prioConf = PRIORITY_STYLE[s.priority];
  const prioBadge = document.getElementById('modal-priority-badge');
  if (prioConf) {
    prioBadge.className = 'chip text-[10px] ' + prioConf.chip;
    prioBadge.textContent = s.priority;
    prioBadge.classList.remove('hidden');
  } else {
    prioBadge.classList.add('hidden');
  }

  // Story points badge
  const spBadge = document.getElementById('modal-sp-badge');
  if (s.story_points != null) {
    spBadge.textContent = 'SP: ' + s.story_points;
    spBadge.classList.remove('hidden');
  } else {
    spBadge.classList.add('hidden');
  }

  // Meta row
  const metaEl = document.getElementById('modal-meta');
  const metaParts = [];
  if (s.lane)     metaParts.push(`<span><b>Estado:</b> ${escHtml(s.lane)}</span>`);
  if (s.assignee) metaParts.push(`<span><b>Asignado:</b> ${escHtml(s.assignee)}</span>`);
  if (s.epic_name) metaParts.push(`<span><b>Epic:</b> ${escHtml(s.epic_name)}</span>`);
  metaEl.innerHTML = metaParts.join('<span class="text-slate-300">·</span>');

  // Description
  const descEl   = document.getElementById('modal-desc');
  const noDescEl = document.getElementById('modal-no-desc');
  const wrapEl   = document.getElementById('modal-desc-wrap');
  if (s.description) {
    descEl.textContent = s.description;
    wrapEl.classList.remove('hidden');
    noDescEl.classList.add('hidden');
  } else {
    wrapEl.classList.add('hidden');
    noDescEl.classList.remove('hidden');
  }

  // Show modal
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
  document.body.style.overflow = '';
}

// Close on Escape key
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Helpers ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return (str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function clearFilters() {
  document.getElementById('filter-epic').value = '';
  document.getElementById('filter-lane').value = '';
  document.getElementById('filter-tipo').value = '';
  document.getElementById('search-input').value = '';
  applyFilters();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  t.style.pointerEvents = 'auto';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateY(8px)';
    t.style.pointerEvents = 'none';
  }, 2500);
}
