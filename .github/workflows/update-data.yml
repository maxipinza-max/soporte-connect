name: Update Soporte Data

on:
  schedule:
    # Runs every day at 07:00 Santiago time (UTC-3 → 10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Soporte stories from Jira (CO)
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python scripts/fetch_soporte.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/soporte.json
          git diff --cached --quiet || git commit -m "chore: update Soporte data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
